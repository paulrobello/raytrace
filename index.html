<!DOCTYPE html>
<html>
  <head>
    <!-- Security response headers (X-Content-Type-Options, X-Frame-Options, Referrer-Policy, Content-Security-Policy) are served via the repo-root _headers file (Cloudflare Pages / Netlify). With the ES-module migration complete, the page has no inline <script>; the CSP's script-src is now 'self' + the cdnjs origin only (no 'unsafe-inline'). The inline <style> below remains, so style-src carries 'unsafe-inline'. -->
    <title>PARTrace JS</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <link type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.14.2/themes/ui-lightness/jquery-ui.min.css" integrity="sha384-M2pbgPLnkMLRvtP1q0TDqxe5wLkGHavhDOgGI3GP57g54WTM6MQ/MHYneum5st0P" crossorigin="anonymous" rel="stylesheet" />
    <link type="text/css" href="css/main.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/4.0.0/jquery.min.js" integrity="sha384-GI1H4/QJiNnNqckCvEHsRWnEq0wXbnHwgcnl0OajhH2/3SR4toFpqRYKqmvuHQuZ" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.14.2/jquery-ui.min.js" integrity="sha384-qMvgAsIqS01waWHzN25xidpfcoTL/TcMWzf3j39ueYCGVtOHOaWCyBnKlqUgp8vH" crossorigin="anonymous"></script>

    <style>
    body {
      font-family: Monospace;
      border:0;
      margin:0;
      padding:0;
      width:100%;
    }
    #output {
      border:0;
      margin:0;
      padding:0;
      width:100%;
    }
    canvas {
      padding: 0;
      margin: 0;
      border: 0px solid black;
      background-color: #000;
      z-index:1;
    }
    #progress{
      width:99%;
      height:24px;
    }
    #render {
    }
    #log {
      width:99%;
      min-height:200px;
      overflow:auto;
      border:1px solid black;
      margin-top:5px;
      white-space:pre;
    }
    #script {
      border:1px solid black;
      width:100%;
      height:100%;
    }
    </style>
  </head>
  <body>
    <div id="tools">
      <div id="reset" class="button">Reset Scene</div>
      <div id="render" class="button">Render</div>
      <div id="save" class="button">Save Image</div>
      <label>Buffer:</label>
      <label>Color</label><input type="radio" class="buffer" value="color" name="buffer" checked>
      <label>Z</label><input type="radio" class="buffer" value="zbuffer" name="buffer">
    </div>
    <table id="output">
      <tr>
        <td width="50%" style="vertical-align:top">
          <canvas id="canvas" width="800" height="600"></canvas>
        </td>
        <td width="50%" style="vertical-align:top">
          <label for="script"><h4>Scene</h4></label><br>
          <form id="form">
            <textarea id="script" rows="33" cols="80">
# lines starting with # are comments
{
  # 0 = auto detect or set to number of cpu cores
  "maxWorkers":0,
  # width and height of image
  "width":800,
  "height":600,
  # 0 = off, 1=3x3, 2=5x5
  "antiAlias":0,
  # 0=disable adaptive aa
  "aaThreshold":0.001,
  "doReflect":true,
  "doRefract":true,
  "doShadows":true,
  "scene":{
    "bg_color":[0,0,0],
    "camera":{
      "position":[0,0,-2.5],
      "fov":90
    },
    "fog":{
      "disabled":true,
      # "linear","exp","exp2"
      "type":"linear",
      "near":1,
      "far":9
    },
    "lights":[
      {
        "disabled":false,
        "type":"point",
        "position":[5,5,-3],
        # "phong","blinn"
        "shader":"phong",
        # "none","linear","squared"
        "attenuationType":"squared",
        "fallOffRadius":12
      }
    ],
    "materials":[
      {
        "name":"checker",
        "type":"checker",
        "scale":[0.1,0.1,0.05],
        "specular":[1,1,1],
        "shiny":128
      },
      {
        "name":"blue",
        "type":"basic",
        "diffuse":[0,0,1],
        "shiny":16,
        "reflect":0.95,
        "metallic":true
      },
      {
        "name":"red",
        "type":"basic",
        "diffuse":[0.9,0,0],
        "specular":[0.9,0,0],
        "shiny":16,
        "reflect":0.25
      },
      {
        "name":"glass",
        "type":"basic",
        "diffuse":[1,0,0,0.75],
        "refract":1.2,
        "shiny":128
      },
      {
        "name":"checkermat",
        "type":"checkermat",
        "diffuse":[0,1,0],
        "diffuse1":"rainbow",
        "diffuse2":"green",
        "scale":[0.1,0.1,0.05]
      },
      {
        "name":"green",
        "type":"basic",
        "diffuse":[0,1,0]
      },
      {
        "name":"rainbow",
        "type":"rainbow",
        "offset":[2,-3,3]
      }
    ],
    "objects":[
      {
        "name":"left Sphere",
        "type":"sphere",
        "material":"checker",
        "radius":1,
        "position":[-1.25,0,0]
      },
      {
        "name":"right Sphere",
        "type":"sphere",
        "material":"blue",
        "radius":1,
        "position":[1.25,0,0]
      },
      {
        "name":"glass Sphere",
        "type":"sphere",
        "material":"glass",
        "radius":0.5,
        "position":[0.75,-0.5,-1.25]
      },
      {
        "name":"floor Plane",
        "type":"plane",
        "material":"checkermat",
        "position":[0,-1,0]
      }
    ]
  }
}
          </textarea>
        </form>
        <div id="progress"></div>
      </td>
    </tr>
  </table>
  <div id="log"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
