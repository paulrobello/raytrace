<!DOCTYPE html>
<html>
<head>
<title>PARTrace JS</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<link type="text/css" href="https://code.jquery.com/ui/1.11.4/themes/ui-lightness/jquery-ui.min.css" rel="stylesheet" />
<link type="text/css" href="/css/main.css" rel="stylesheet" />
<script src="https://code.jquery.com/jquery-1.12.3.min.js"></script>
<script src="https://code.jquery.com/ui/1.11.4/jquery-ui.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.11.2/lodash.min.js"></script>

<script src="https://rawgit.com/toji/gl-matrix/master/dist/gl-matrix-min.js"></script>

<script src="/js/class.js"></script>
<script src="/js/par.js"></script>
<script src="/parmath.js"></script>
<script src="/utils.js"></script>

<script src="/partrace.js"></script>

<style>
body {
  font-family: Monospace;
  border:0;
  margin:0;
  padding:0;
  width:100%;
}
#output {
  border:0;
  margin:0;
  padding:0;
  width:auto;
  float:left;
}
canvas {
  border: 0px solid black;
  background-color: #000;
  z-index:1;
}
#progress{
  width:99%;
  height:24px;
}
#render {
}
#log {
  width:99%;
  min-height:200px;
  overflow:auto;
  border:1px solid black;
  margin-top:5px;
  white-space:pre;
}
#script {
  border:1px solid black;
}
</style>
<script>
var partrace=null;
function saveContent(dataurl, fileName){
  var link = document.createElement('a');
  link.download = fileName;
  link.href = dataurl;
  link.click();
}
$(document).ready(function(){
  partrace=new Partrace("canvas");
  $("#progress").progressbar();
  $("#save").button().click(function(){
    //var image = $("#canvas")[0].toDataURL("image/png").replace("image/png", "image/octet-stream");  // here is the most important part because if you dont replace you will get a DOM 18 exception.
    //window.location.href=image; // it will save locally
    saveContent($("#canvas")[0].toDataURL(),'img.png');
  });
  $("#render").button().click(function(){
    $("#log").empty();
    try{
      partrace.render(JSON.parse($("#script").val()));
    }catch(e){
      alert(e);
    }
  });
  $(".buffer").click(function(){
    if ($(this).val()==='color'){
      partrace.copyColorToScreen();
    }else{
      partrace.copyZToScreen();
    }
  });
//  setTimeout(function(){$("#render").click();},1000);
  //partrace.testScene();
});

</script>
</head>
<body>
<div id="output">
  <canvas id="canvas" width="640" height="480"></canvas>
  <div id="progress"></div>
</div>
<div style="float:left;">
  <div><label for="script"><h4>Scene</h4></label></div>
  <textarea id="script" rows="30" cols="80">
{
  "maxWorkers":0,
  "width":800,
  "height":600,
  "antiAlias":0,
  "camera":{
    "position":[0,0,-2.5],
    "fov":90
  },
  "scene":{
    "bg_color":[0,0,0],
    "fog":{
      "disabled":true,
      "type":"linear",
      "near":1,
      "far":9
    },
    "lights":[
      {
         "type":"point",
         "position":[5,5,-5],
         "shader":"blinn",
         "attenuationType":"squared",
         "fallOffRadius":11
      }
    ],
    "materials":[
      {
        "name":"checker",
        "type":"checker",
        "scale":[0.1,0.1,0.05],
        "specular":[2,2,2],
        "shiny":128,
        "metallic":true
      },
      {
        "name":"blue",
        "type":"basic",
        "diffuse":[0,0,0.9],
        "shiny":16,
        "reflect":0.25
      },
      {
        "name":"red",
        "type":"basic",
        "diffuse":[0.9,0,0],
        "specular":[0.9,0,0],
        "shiny":16,
        "reflect":0.25
      },
      {
        "name":"glass",
        "type":"basic",
        "diffuse":[1,1,1,0.25],
        "refract":1.51714,
        "shiny":128
      },
      {
        "name":"checkermat",
        "type":"checkermat",
        "diffuse":[0,1,0],
        "diffuse1":"rainbow",
        "diffuse2":"green",
        "scale":[0.1,0.1,0.05]
      },
      {
        "name":"green",
        "type":"basic",
        "diffuse":[0,1,0]
      },
      {
        "name":"rainbow",
        "type":"rainbow"
      }
    ],
    "objects":[
      {
        "name":"left Sphere",
        "type":"sphere",
        "material":"checker",
        "radius":1,
        "position":[-1.25,0,0]
      },
      {
        "name":"right Sphere",
        "type":"sphere",
        "material":"blue",
        "radius":1,
        "position":[1.25,0,0]
      },
      {
        "disabled":false,
        "name":"glass Sphere",
        "type":"sphere",
        "material":"glass",
        "radius":0.5,
        "position":[0.75,-0.5,-1.25]
      },
      {
        "name":"floor Plane",
        "type":"plane",
        "material":"checkermat",
        "position":[0,-1,0]
      }
    ]
  }
}
</textarea>
</div>
<div id="render" class="button">Render</div>
<div id="save" class="button">Save</div>
<label>Color</label><input type="radio" class="buffer" value="color" name="buffer" checked>
<label>ZBuffer</label><input type="radio" class="buffer" value="zbuffer" name="buffer">
<div id="log"></div>
</body>
</html>
