<!DOCTYPE html>
<html>
<head>
<title>PARTrace JS</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<link type="text/css" href="/css/themes/default/jquery-ui.css" rel="stylesheet" />
<link type="text/css" href="/css/main.css" rel="stylesheet" />
<script src="/js/jquery.min.js"></script>
<script src="/js/jquery-ui.custom.min.js"></script>

<script src="/js/gl-matrix/dist/gl-matrix.js"></script>
<script src="/js/class.js"></script>
<script src="/js/par.js"></script>
<script src="/utils.js"></script>

<script src="/partrace.js"></script>

<style>
body {
  overflow:hidden;
  font-family: Monospace;  
}
#content {
  width:640px;
  margin:5px;
}
canvas { 
  border: 0px solid black;
  background-color: #000;
  z-index:1;
  position:relative;  
  width:100%;
  height:100%;
}
#progress{
  left:420px;
  top:232px;
  width:480px;
  height:24px;
  position:absolute;
  -webkit-transform: rotate(-90deg); 
  -moz-transform: rotate(-90deg); 
  -o-transform: rotate(-90deg);
  -ms-transform: rotate(-90deg);     
}
#log {
  width:638px;
  height:200px;
  overflow:auto;
  border:1px solid black;
  margin-top:5px;
  white-space:pre;
}
</style>
<script>
var partrace=null;

$(document).ready(function(){
  $("#progress").progressbar();
  partrace=new Partrace("canvas");
  partrace.testScene();  
});

</script>
</head>
<body>
<div id="content">
<canvas id="canvas" width="640" height="480"></canvas>
<div id="progress"></div>
<div id="log"></div>
</div>
</body>
</html>
