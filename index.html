<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PARTrace — CPU Ray Tracer</title>
    <meta
      name="description"
      content="A pure-CPU JavaScript ray tracer. Edit the scene and render in your browser — no GPU, every pixel traced in Web Workers."
    />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <header class="appbar">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true">◢</span>
        <div class="brand__text">
          <h1>PARTrace</h1>
          <p>CPU ray tracer <span aria-hidden="true">·</span> <span id="coreCount">— cores</span></p>
        </div>
      </div>
      <div class="actions">
        <button id="renderBtn" class="btn btn--primary" type="button" title="Ctrl/⌘ + Enter">
          Render <kbd aria-hidden="true">⌘↵</kbd>
        </button>
        <button id="resetBtn" class="btn" type="button">Reset</button>
        <button id="saveBtn" class="btn" type="button">Save Image</button>
      </div>
    </header>

    <main class="workspace">
      <section class="viewport" aria-label="Render viewport">
        <div class="viewport__frame">
          <canvas id="canvas" width="800" height="600"></canvas>
          <div class="viewport__sweep is-idle" id="sweep" aria-hidden="true"></div>
          <div class="viewport__empty" id="emptyState">Press Render to trace the scene</div>
        </div>

        <div class="telemetry" aria-label="Render telemetry">
          <div class="metric metric--lg">
            <span class="metric__label">Rays</span>
            <span class="metric__value" id="mRays">0</span>
          </div>
          <div class="metric">
            <span class="metric__label">Rays / sec</span>
            <span class="metric__value" id="mRaysSec">—</span>
          </div>
          <div class="metric">
            <span class="metric__label">Time</span>
            <span class="metric__value" id="mTime">—</span>
          </div>
          <div class="progress" aria-label="Render progress">
            <div class="progress__bar" id="progressBar"></div>
            <span class="progress__pct" id="progressPct">0%</span>
          </div>
          <div class="raybreak" id="rayBreak" aria-label="Ray type breakdown"></div>
        </div>
      </section>

      <aside class="sidebar">
        <section class="panel panel--editor">
          <div class="panel__head">
            <h2>Scene</h2>
            <div class="buffer-toggle" role="group" aria-label="Buffer view">
              <label class="seg"><input type="radio" name="buffer" value="color" checked /><span>Color</span></label>
              <label class="seg"><input type="radio" name="buffer" value="z" /><span>Depth</span></label>
            </div>
          </div>
          <textarea id="scene" spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>
          <p class="panel__hint">JSON with <code>#</code> comments. Edited scenes persist across reloads.</p>
        </section>

        <section class="panel panel--log">
          <div class="panel__head">
            <h2>Log</h2>
            <button id="clearLog" class="linkbtn" type="button">clear</button>
          </div>
          <pre id="log" class="log"></pre>
        </section>
      </aside>
    </main>
  </body>
</html>
